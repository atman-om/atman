services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atman
      POSTGRES_PASSWORD: atman
      POSTGRES_DB: atman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atman -d atman"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atman
      MINIO_ROOT_PASSWORD: atman-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - ./generated/uploads:/workspace/generated/uploads
      - ./generated/ocr:/workspace/generated/ocr
      - ./generated/training:/workspace/generated/training
      - ./generated/backups:/workspace/generated/backups

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    command: python -m services.api.app.worker
    env_file: .env
    depends_on:
      api:
        condition: service_started
    volumes:
      - .:/workspace

  public:
    build:
      context: .
      dockerfile: apps/public/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3001:3001"
    volumes:
      - ./apps/public:/workspace/apps/public

  studio:
    build:
      context: .
      dockerfile: apps/studio/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/studio:/workspace/apps/studio

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
