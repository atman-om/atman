"$schema" = "./node_modules/wrangler/config-schema.json"
name = "swabodh-atman"
main = ".open-next/worker.js"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[[routes]]
pattern = "atman.swabodh.in"
custom_domain = true
